{% extends "base.html" %}

{% block content %}
<div class="max-w-5xl mx-auto space-y-6">
    <!-- Header -->
    <div class="flex items-center justify-between">
        <div>
            <h1 class="text-2xl font-bold">Meal Plan Generator</h1>
            <p class="text-gray-500 text-sm">KI-gestutzte Ernahrungsplanung</p>
        </div>
        <button type="button" onclick="openGenerateModal()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-xl font-medium transition flex items-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
            Neuer Plan
        </button>
    </div>

    <!-- Generation Progress -->
    <div id="progressCard" class="hidden bg-gray-900 border border-gray-800 rounded-2xl p-6">
        <div class="flex items-center gap-4 mb-4">
            <div class="w-10 h-10 border-4 border-gray-700 border-t-green-500 rounded-full animate-spin shrink-0"></div>
            <div>
                <p class="font-semibold">Ernahrungsplan wird erstellt...</p>
                <p class="text-sm text-gray-500">Die KI erstellt deinen personalisierten Plan</p>
            </div>
        </div>
        <div class="w-full bg-gray-800 rounded-full h-2">
            <div id="progressBar" class="h-2 rounded-full bg-gradient-to-r from-green-600 to-emerald-400 transition-all duration-300 w-[10%]"></div>
        </div>
    </div>

    <!-- Rendered Plan -->
    <div id="planCard" class="hidden bg-gray-900 border border-gray-800 rounded-2xl overflow-hidden">
        <div class="flex items-center justify-between px-6 py-4 border-b border-gray-800">
            <div>
                <h3 class="text-lg font-semibold">Dein Ernahrungsplan</h3>
                <p class="text-sm text-gray-500" id="planMeta"></p>
            </div>
            <div class="flex gap-2">
                <button type="button" onclick="downloadPlan()" class="text-gray-400 hover:text-white p-2 rounded-lg hover:bg-gray-800 transition" aria-label="Herunterladen">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                </button>
                <button type="button" onclick="hidePlan()" class="text-gray-400 hover:text-white p-2 rounded-lg hover:bg-gray-800 transition" aria-label="Schliessen">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
        </div>
        <div id="planContent" class="p-6 prose prose-invert prose-green max-w-none
            prose-headings:text-white prose-headings:font-bold
            prose-h2:text-xl prose-h2:mt-6 prose-h2:mb-3 prose-h2:pb-2 prose-h2:border-b prose-h2:border-gray-800
            prose-h3:text-lg prose-h3:mt-4 prose-h3:mb-2 prose-h3:text-green-400
            prose-p:text-gray-300 prose-p:leading-relaxed
            prose-li:text-gray-300
            prose-strong:text-white
            prose-ul:space-y-1 prose-ol:space-y-1
            prose-hr:border-gray-800
        "></div>
    </div>

    <!-- Saved Plans -->
    <div class="bg-gray-900 border border-gray-800 rounded-2xl p-6">
        <h3 class="text-lg font-semibold mb-4">Gespeicherte Plane</h3>
        <div id="plansList" class="space-y-3"></div>
        <p id="emptyPlans" class="text-gray-600 text-center py-6 hidden">Noch keine Plane erstellt</p>
    </div>
</div>

<!-- Generate Modal -->
<div id="generateModal" class="modal-overlay hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="modal-content bg-gray-900 border border-gray-700 rounded-2xl w-full max-w-lg max-h-[90vh] overflow-y-auto p-6">
        <div class="flex items-center justify-between mb-6">
            <h3 class="text-xl font-bold">Neuer Ernahrungsplan</h3>
            <button type="button" onclick="document.getElementById('generateModal').classList.add('hidden')" class="text-gray-500 hover:text-white transition" aria-label="Schliessen">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>
        <form id="mealPlanForm" class="space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Alter (Jahre)</label>
                    <input type="number" id="age" min="1" max="120" required placeholder="z.B. 25" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-green-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Grosse (cm)</label>
                    <input type="number" id="height" min="100" max="250" step="0.1" required placeholder="z.B. 180" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-green-500 outline-none">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Gewicht (kg)</label>
                    <input type="number" id="weight" min="30" max="300" step="0.1" required placeholder="z.B. 75" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-green-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">BMI (berechnet)</label>
                    <input type="text" id="bmi" readonly class="w-full bg-gray-800/50 border border-gray-700 rounded-xl px-4 py-3 text-gray-500 outline-none" placeholder="automatisch">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Essverhalten</label>
                    <select id="eatingHabit" required title="Essverhalten" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-green-500 outline-none">
                        <option value="">Wahlen...</option>
                        <option value="Alles">Alles</option>
                        <option value="Vegetarisch">Vegetarisch</option>
                        <option value="Vegan">Vegan</option>
                        <option value="Pescetarisch">Pescetarisch</option>
                        <option value="Low-Carb">Low-Carb</option>
                        <option value="Keto">Keto</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Ziel</label>
                    <select id="goal" required title="Ziel" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-green-500 outline-none">
                        <option value="Abnehmen">Abnehmen</option>
                        <option value="Zunehmen">Zunehmen</option>
                        <option value="Muskelaufbau">Muskelaufbau</option>
                        <option value="Ausgewogen" selected>Ausgewogen</option>
                        <option value="Gesund leben">Gesund leben</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Anzahl Tage</label>
                    <input type="number" id="days" min="1" max="30" value="7" required placeholder="7" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-green-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-1">Lieblingsessen</label>
                    <input type="text" id="favoriteFoods" required placeholder="z.B. Pasta, Hahnchen" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-4 py-3 text-white focus:ring-2 focus:ring-green-500 outline-none">
                </div>
            </div>
            <button type="submit" id="submitBtn" class="w-full bg-green-600 hover:bg-green-700 text-white font-medium py-3 rounded-xl transition">Plan erstellen</button>
        </form>
    </div>
</div>

<!-- View Plan Modal -->
<div id="viewModal" class="modal-overlay hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="modal-content bg-gray-900 border border-gray-700 rounded-2xl w-full max-w-4xl max-h-[90vh] overflow-y-auto">
        <div class="sticky top-0 bg-gray-900/95 backdrop-blur-sm flex items-center justify-between px-6 py-4 border-b border-gray-800 z-10">
            <h3 id="modalTitle" class="text-xl font-bold">Ernahrungsplan</h3>
            <div class="flex gap-2">
                <button type="button" onclick="downloadModalPlan()" class="text-gray-400 hover:text-white p-2 rounded-lg hover:bg-gray-800 transition" aria-label="Herunterladen">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                </button>
                <button type="button" onclick="document.getElementById('viewModal').classList.add('hidden')" class="text-gray-400 hover:text-white p-2 rounded-lg hover:bg-gray-800 transition" aria-label="Schliessen">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
        </div>
        <div id="modalContent" class="p-6 prose prose-invert prose-green max-w-none
            prose-headings:text-white prose-headings:font-bold
            prose-h2:text-xl prose-h2:mt-6 prose-h2:mb-3 prose-h2:pb-2 prose-h2:border-b prose-h2:border-gray-800
            prose-h3:text-lg prose-h3:mt-4 prose-h3:mb-2 prose-h3:text-green-400
            prose-p:text-gray-300 prose-p:leading-relaxed
            prose-li:text-gray-300
            prose-strong:text-white
            prose-ul:space-y-1 prose-ol:space-y-1
            prose-hr:border-gray-800
        "></div>
    </div>
</div>

<!-- Marked.js for Markdown rendering -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<script>
const API_URL = '/mealplan';
let currentPlanText = '';
let modalPlanText = '';

function calculateBMI() {
    const height = parseFloat(document.getElementById('height').value);
    const weight = parseFloat(document.getElementById('weight').value);
    if (height && weight) {
        document.getElementById('bmi').value = (weight / Math.pow(height / 100, 2)).toFixed(1);
    }
}

function openGenerateModal() {
    document.getElementById('generateModal').classList.remove('hidden');
}

document.getElementById('height').addEventListener('input', calculateBMI);
document.getElementById('weight').addEventListener('input', calculateBMI);

document.getElementById('mealPlanForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    document.getElementById('generateModal').classList.add('hidden');
    document.getElementById('progressCard').classList.remove('hidden');
    document.getElementById('planCard').classList.add('hidden');
    document.getElementById('submitBtn').disabled = true;

    const data = {
        age: parseInt(document.getElementById('age').value),
        height: parseFloat(document.getElementById('height').value),
        weight: parseFloat(document.getElementById('weight').value),
        eating_habit: document.getElementById('eatingHabit').value,
        favorite_foods: document.getElementById('favoriteFoods').value.split(',').map(f => f.trim()),
        goal: document.getElementById('goal').value,
        days: parseInt(document.getElementById('days').value)
    };

    currentPlanText = '';
    let progress = 10;

    try {
        const response = await fetch(API_URL + '/generate/stream', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;

            const chunk = decoder.decode(value);
            const lines = chunk.split('\n').filter(l => l.trim());

            for (const line of lines) {
                try {
                    const parsed = JSON.parse(line);
                    if (parsed.error) {
                        alert('Fehler: ' + parsed.error);
                        break;
                    }
                    if (parsed.token) {
                        currentPlanText += parsed.token;
                        progress = Math.min(progress + 2, 90);
                        document.getElementById('progressBar').style.width = progress + '%';
                    }
                    if (parsed.done) {
                        document.getElementById('progressBar').style.width = '100%';
                    }
                } catch (e) { /* skip non-json lines */ }
            }
        }

        // Render the plan
        document.getElementById('planMeta').textContent = data.goal + ' · ' + data.eating_habit + ' · ' + data.days + ' Tage';
        document.getElementById('planContent').innerHTML = marked.parse(currentPlanText);
        document.getElementById('planCard').classList.remove('hidden');

    } catch (error) {
        alert('Fehler: ' + error.message);
    } finally {
        document.getElementById('progressCard').classList.add('hidden');
        document.getElementById('submitBtn').disabled = false;
        loadPlans();
    }
});

function hidePlan() {
    document.getElementById('planCard').classList.add('hidden');
}

async function loadPlans() {
    try {
        const response = await fetch(API_URL);
        const plans = await response.json();
        const list = document.getElementById('plansList');
        const empty = document.getElementById('emptyPlans');
        list.innerHTML = '';

        if (plans.length === 0) {
            empty.classList.remove('hidden');
        } else {
            empty.classList.add('hidden');
            plans.forEach(plan => {
                const goalColors = {
                    'Abnehmen': 'bg-red-900/30 text-red-400',
                    'Zunehmen': 'bg-blue-900/30 text-blue-400',
                    'Muskelaufbau': 'bg-purple-900/30 text-purple-400',
                    'Ausgewogen': 'bg-green-900/30 text-green-400',
                    'Gesund leben': 'bg-cyan-900/30 text-cyan-400'
                };
                const colorClass = goalColors[plan.goal] || 'bg-gray-700 text-gray-400';
                const card = document.createElement('div');
                card.className = 'bg-gray-800/50 border border-gray-700/50 rounded-xl p-4 flex items-center justify-between gap-4';
                card.innerHTML = `
                    <div class="flex items-center gap-3 min-w-0">
                        <span class="px-2 py-1 rounded-lg text-xs font-medium whitespace-nowrap ${colorClass}">${plan.goal}</span>
                        <div class="min-w-0">
                            <p class="font-medium text-sm">${plan.eating_habit} · ${plan.days} Tage</p>
                            <p class="text-xs text-gray-500">${plan.date}</p>
                        </div>
                    </div>
                    <div class="flex gap-2 shrink-0">
                        <button type="button" onclick="viewPlan(${plan.id})" class="text-gray-400 hover:text-green-400 transition p-1" aria-label="Ansehen">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                        </button>
                        <button type="button" onclick="deletePlan(${plan.id})" class="text-gray-400 hover:text-red-400 transition p-1" aria-label="Löschen">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        </button>
                    </div>`;
                list.appendChild(card);
            });
        }
    } catch (error) {
        console.error(error);
    }
}

async function viewPlan(id) {
    try {
        const response = await fetch(API_URL + '/' + id);
        const plan = await response.json();
        modalPlanText = plan.plan;
        document.getElementById('modalTitle').textContent = plan.goal + ' · ' + plan.eating_habit + ' · ' + plan.days + ' Tage';
        document.getElementById('modalContent').innerHTML = marked.parse(plan.plan);
        document.getElementById('viewModal').classList.remove('hidden');
    } catch (error) {
        alert('Fehler beim Laden');
    }
}

async function deletePlan(id) {
    if (!confirm('Plan wirklich loschen?')) return;
    try {
        await fetch(API_URL + '/' + id, { method: 'DELETE' });
        loadPlans();
    } catch (error) {
        console.error(error);
    }
}

function downloadPlan() {
    const blob = new Blob([currentPlanText], { type: 'text/markdown' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'ernaehrungsplan_' + new Date().toISOString().split('T')[0] + '.md';
    a.click();
    URL.revokeObjectURL(a.href);
}

function downloadModalPlan() {
    const blob = new Blob([modalPlanText], { type: 'text/markdown' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'ernaehrungsplan_' + new Date().toISOString().split('T')[0] + '.md';
    a.click();
    URL.revokeObjectURL(a.href);
}

loadPlans();
</script>
{% endblock %}
