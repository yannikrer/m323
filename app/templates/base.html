<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: { 50:'#eef2ff',100:'#e0e7ff',200:'#c7d2fe',300:'#a5b4fc',400:'#818cf8',500:'#6366f1',600:'#4f46e5',700:'#4338ca',800:'#3730a3',900:'#312e81' },
                        accent:  { 50:'#faf5ff',100:'#f3e8ff',200:'#e9d5ff',300:'#d8b4fe',400:'#c084fc',500:'#a855f7',600:'#9333ea',700:'#7e22ce',800:'#6b21a8',900:'#581c87' }
                    }
                }
            }
        }
    </script>
    <style>
        .modal-overlay { transition: opacity 0.3s; }
        .modal-content { transition: transform 0.3s, opacity 0.3s; }
        .modal-overlay.hidden { opacity: 0; pointer-events: none; }
        .modal-overlay.hidden .modal-content { transform: scale(0.95); opacity: 0; }
    </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">
    <!-- Mobile Nav Toggle -->
    <button type="button" id="navToggle" class="lg:hidden fixed top-4 left-4 z-50 p-2 rounded-lg bg-primary-600 hover:bg-primary-700 transition" aria-label="Menu offnen">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-gray-900 border-r border-gray-800 transform -translate-x-full lg:translate-x-0 transition-transform z-40">
        <div class="p-6 border-b border-gray-800">
            <h1 class="text-2xl font-bold bg-gradient-to-r from-primary-400 to-accent-400 bg-clip-text text-transparent">Gym Tracker</h1>
            <p class="text-gray-500 text-sm mt-1">Dein Fitness-Dashboard</p>
        </div>
        <nav class="p-4 space-y-1">
            <a href="/" data-nav="home" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800 hover:text-white transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0h4"/></svg>
                Home
            </a>
            <a href="/running-page" data-nav="running" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800 hover:text-white transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                Running
            </a>
            <a href="/calories-page" data-nav="calories" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800 hover:text-white transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                Kalorien
            </a>
            <a href="/water-page" data-nav="water" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800 hover:text-white transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/></svg>
                Wasser
            </a>
            <a href="/mealplan" data-nav="mealplan" class="nav-link flex items-center gap-3 px-4 py-3 rounded-xl text-gray-400 hover:bg-gray-800 hover:text-white transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
                Meal Plan
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="lg:ml-64 min-h-screen">
        <div class="p-4 sm:p-6 lg:p-8 pt-16 lg:pt-8">
            {% block content %}
            <div class="max-w-4xl mx-auto">
                <div class="text-center py-20">
                    <h2 class="text-4xl font-bold mb-4 bg-gradient-to-r from-primary-400 to-accent-400 bg-clip-text text-transparent">Willkommen beim Gym Tracker</h2>
                    <p class="text-gray-400 text-lg mb-8">Wahle eine Kategorie aus dem Menu.</p>
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 max-w-2xl mx-auto">
                        <a href="/running-page" class="bg-gray-900 border border-gray-800 rounded-2xl p-6 hover:border-primary-500 hover:bg-gray-800/50 transition group">
                            <div class="text-3xl mb-2">🏃</div>
                            <div class="font-semibold group-hover:text-primary-400 transition">Running</div>
                        </a>
                        <a href="/calories-page" class="bg-gray-900 border border-gray-800 rounded-2xl p-6 hover:border-accent-500 hover:bg-gray-800/50 transition group">
                            <div class="text-3xl mb-2">🍽️</div>
                            <div class="font-semibold group-hover:text-accent-400 transition">Kalorien</div>
                        </a>
                        <a href="/water-page" class="bg-gray-900 border border-gray-800 rounded-2xl p-6 hover:border-blue-500 hover:bg-gray-800/50 transition group">
                            <div class="text-3xl mb-2">💧</div>
                            <div class="font-semibold group-hover:text-blue-400 transition">Wasser</div>
                        </a>
                        <a href="/mealplan" class="bg-gray-900 border border-gray-800 rounded-2xl p-6 hover:border-green-500 hover:bg-gray-800/50 transition group">
                            <div class="text-3xl mb-2">📋</div>
                            <div class="font-semibold group-hover:text-green-400 transition">Meal Plan</div>
                        </a>
                    </div>
                </div>
            </div>
            {% endblock %}
        </div>
    </main>

    <script>
        // Mobile nav toggle
        document.getElementById('navToggle').addEventListener('click', () => {
            document.getElementById('sidebar').classList.toggle('-translate-x-full');
        });

        // Close sidebar on link click (mobile)
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', () => {
                if (window.innerWidth < 1024) {
                    document.getElementById('sidebar').classList.add('-translate-x-full');
                }
            });
        });

        // Active nav highlight
        const currentPath = window.location.pathname;
        document.querySelectorAll('.nav-link').forEach(link => {
            if (link.getAttribute('href') === currentPath) {
                link.classList.remove('text-gray-400');
                link.classList.add('bg-primary-600/20', 'text-primary-400');
            }
        });
    </script>
</body>
</html>
